apiVersion: v1
kind: Pod
metadata:
  name: oomhero
  namespace: oomhero
spec:
  shareProcessNamespace: true
  containers:
  - name: bloat
    image: quay.io/rmarasch/bloat:latest
    imagePullPolicy: Always
    livenessProbe:
      periodSeconds: 3
      failureThreshold: 1
      httpGet:
        path: /healthz
        port: 8080
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "250m"
  - name: oomhero
    image: docker.io/ricardomaraschini/oomhero:v2
    imagePullPolicy: Always
    args:
    - --memory-usage-warning=80
    - --memory-usage-critical=90
    resources:
      limits:
        cpu: "10m"
        memory: "32Mi"
    securityContext:
      capabilities:
        add:
        - SYS_PTRACE

