---
name: pull_request
on:
  pull_request:
    branches:
    - main
jobs:
  tests:
    name: run tests
    runs-on: ubuntu-latest
    steps:
    - name: check out code
      uses: actions/checkout@v6
    - name: setup podman socket
      run: systemctl --user start podman.socket
    - name: run tests
      run: make test-verbose
