---
name: pull_request
on:
  pull_request:
    branches:
    - main
jobs:
  tests:
    name: run tests
    runs-on: ubuntu-latest
    steps:
    - name: check out code
      uses: actions/checkout@v6
    - name: run lint
      run: make lint
    - name: run tests
      run: make test-verbose-as-root
