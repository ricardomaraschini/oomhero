---
name: pull_request
on:
  pull_request:
    branches:
    - main
jobs:
  tests:
    name: run tests
    runs-on: ubuntu-latest
    steps:
    - name: check out code
      uses: actions/checkout@v6
    - name: run tests
      run: make test-verbose
  build:
    name: build artifacts
    runs-on: ubuntu-latest
    steps:
    - name: check out code
      uses: actions/checkout@v6
    - name: build
      run: make build
    - name: image build
      run: make image-build
