name: tag
on:
  push:
    tags:
    - 'v*'
jobs:
  publish-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
    - name: check out code
      uses: actions/checkout@v6
    - name: extract current tag
      id: get_tag
      run: echo "tag=$(echo $GITHUB_REF | cut -d / -f 3)" >> $GITHUB_OUTPUT
    - name: check tag cargo consistency
      run: |-
        cargo_version="v$(cargo pkgid | cut -d# -f2)"
        tag_version="${{ steps.get_tag.outputs.tag }}"
        if [ "$cargo_version" != "$tag_version" ] ; then 
          echo "cargo version different than tag version"
          echo "cargo version: '$cargo_version'"
          echo "tag   version: '$tag_version'"
          exit 1
        fi
    - name: log in to the registry
      uses: docker/login-action@4f5a161ff1b9dde732913c738afffb9afac67587
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: image build push
      run: make image-build-push TAG=${{ steps.get_tag.outputs.tag }}
