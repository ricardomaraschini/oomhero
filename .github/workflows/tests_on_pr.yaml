---
name: tests (pr)
on:
  pull_request:
    branches:
    - main
jobs:
  build:
    name: run tests
    runs-on: ubuntu-latest
    steps:
    - name: check out code
      uses: actions/checkout@v6
    - name: run tests
      run: make test-verbose
    - name: build test binary
      run: make build
